<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22256%22 height=%22256%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23e91e63%22></rect><path fill=%22%23fff%22 d=%22M59.59 47.63L85.25 79.92Q85.63 80.50 85.63 81.25Q85.63 82.02 85.01 82.63Q84.39 83.25 83.54 83.25L83.54 83.25L59.02 83.25Q56.84 83.25 55.60 81.73L55.60 81.73L39.07 61.30L39.07 80.69Q39.07 81.73 38.31 82.49Q37.55 83.25 36.51 83.25L36.51 83.25L16.94 83.25Q15.89 83.25 15.13 82.49Q14.38 81.73 14.38 80.69L14.38 80.69L14.38 19.31Q14.38 18.27 15.13 17.51Q15.89 16.75 16.94 16.75L16.94 16.75L36.51 16.75Q37.55 16.75 38.31 17.51Q39.07 18.27 39.07 19.31L39.07 19.31L39.07 37.17L54.09 18.36Q55.51 16.75 57.60 16.75L57.60 16.75L80.50 16.75Q81.35 16.75 81.97 17.37Q82.59 17.98 82.59 18.79Q82.59 19.60 82.11 20.17L82.11 20.17L59.59 47.63Z%22></path></svg>" />
    <title>Convert Thai->Eng *** Eng->Thai เพราะพิมพ์โดยใช้ keyboard ผิดภาษา</title>
    <style>
        :root {
            --blue-bg: #f0f7ff;
            --blue-border: #bae6fd;
            --peach-bg: #fff9f0;
            --peach-border: #fed7aa;
            --text: #1e293b;
            --primary: #2563eb;
            --success: #059669;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        h1 { text-align: center; color: #334155; margin-bottom: 2rem; font-weight: 800; }

        .converter-section {
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
        }
        .eng-to-thai { background-color: var(--blue-bg); border-color: var(--blue-border); }
        .thai-to-eng { background-color: var(--peach-bg); border-color: var(--peach-border); }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-header h2 { margin: 0; font-size: 1.25rem; color: #475569; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .box-group { display: flex; flex-direction: column; }
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
        .output-box { background-color: rgba(255,255,255,0.6); color: #334155; }

        .copy-btn {
            background: white;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: #f1f5f9; border-color: var(--primary); }
        .copy-btn.copied { background: var(--success); color: white; border-color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>Keyboard Converter</h1>

    <div class="converter-section eng-to-thai">
        <div class="section-header">
            <h2>English Key → Thai Text</h2>
        </div>
        <div class="grid">
            <div class="box-group">
                <label>English Input (US QWERTY)</label>
                <textarea id="e2tInput" placeholder="Type here (e.g., follow)"></textarea>
            </div>
            <div class="box-group">
                <div class="label-row">
                    <label>Thai Output (Kedmanee)</label>
                    <button class="copy-btn" onclick="copyText('e2tOutput', this)">Copy Result</button>
                </div>
                <textarea id="e2tOutput" class="output-box" readonly placeholder="Result: ดนสสนไ"></textarea>
            </div>
        </div>
    </div>

    <div class="converter-section thai-to-eng">
        <div class="section-header">
            <h2>Thai Key → English Text</h2>
        </div>
        <div class="grid">
            <div class="box-group">
                <label>Thai Input (Kedmanee)</label>
                <textarea id="t2eInput" placeholder="Type here (e.g., ดนสสนไ)"></textarea>
            </div>
            <div class="box-group">
                <div class="label-row">
                    <label>English Output (US QWERTY)</label>
                    <button class="copy-btn" onclick="copyText('t2eOutput', this)">Copy Result</button>
                </div>
                <textarea id="t2eOutput" class="output-box" readonly placeholder="Result: follow"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    const thaiToEng = {
        'ๅ': '1', '+': '!', '/': '2', '๑': '@', '-': '3', '๒': '#', 'ภ': '4', '๓': '$', 'ถ': '5', '๔': '%', 'ุ': '6', 'ู': '^', 'ึ': '7', '฿': '&', 'ค': '8', '๕': '*', 'ต': '9', '๖': '(', 'จ': '0', '๗': ')', 'ข': '-', '๘': '_', 'ช': '=', '๙': '+',
        'ๆ': 'q', '๐': 'Q', 'ไ': 'w', '"': 'W', 'ำ': 'e', 'ฎ': 'E', 'พ': 'r', 'ฑ': 'R', 'ะ': 't', 'ธ': 'T', 'ั': 'y', 'ํ': 'Y', 'ี': 'u', '๊': 'U', 'ร': 'i', 'ณ': 'I', 'น': 'o', 'ฯ': 'O', 'ย': 'p', 'ญ': 'P', 'บ': '[', 'ฐ': '{', 'ล': ']', 'ฅ': '}', 'ฃ': '\\', '|': '|',
        'ฟ': 'a', 'ฤ': 'A', 'ห': 's', 'ฆ': 'S', 'ก': 'd', 'ฏ': 'D', 'ด': 'f', 'โ': 'F', 'เ': 'g', 'ฌ': 'G', '้': 'h', '็': 'H', '่': 'j', '๋': 'J', 'า': 'k', 'ษ': 'K', 'ส': 'l', 'ศ': 'L', 'ว': ';', 'ซ': ':', 'ง': "'", '.': '"',
        'ผ': 'z', '(': 'Z', 'ป': 'x', ')': 'X', 'แ': 'c', 'ฉ': 'C', 'อ': 'v', 'ฮ': 'V', 'ิ': 'b', 'ฺ': 'B', 'ื': 'n', '์': 'N', 'ท': 'm', '?': 'M', 'ม': ',', '<': '<', 'ใ': '.', '>': '>', 'ฝ': '/', 'ฬ': '?'
    };

    const engToThai = Object.fromEntries(Object.entries(thaiToEng).map(([k, v]) => [v, k]));

    // Handle English to Thai
    const e2tInput = document.getElementById('e2tInput');
    const e2tOutput = document.getElementById('e2tOutput');
    e2tInput.addEventListener('input', () => {
        let result = '';
        for (let char of e2tInput.value) {
            result += engToThai[char] !== undefined ? engToThai[char] : char;
        }
        e2tOutput.value = result;
    });

    // Handle Thai to English
    const t2eInput = document.getElementById('t2eInput');
    const t2eOutput = document.getElementById('t2eOutput');
    t2eInput.addEventListener('input', () => {
        let result = '';
        for (let char of t2eInput.value) {
            result += thaiToEng[char] !== undefined ? thaiToEng[char] : char;
        }
        t2eOutput.value = result;
    });

    // Universal Copy Function
    async function copyText(areaId, btn) {
        const text = document.getElementById(areaId).value;
        if (!text) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 2000);
        } catch (err) {
            console.error('Failed to copy: ', err);
        }
    }
</script>

</body>
</html>
